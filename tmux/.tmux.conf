# ===================================================================
# tmux configuration — optimized for SSH + multi-Claude workflow
# ===================================================================

# ---------- General ----------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,alacritty:RGB,xterm-kitty:RGB"
set -g history-limit 50000
set -sg escape-time 0           # responsive Neovim/Claude (no ESC delay)
set -g focus-events on
set -g mouse on
set -g base-index 1             # windows start at 1, not 0
setw -g pane-base-index 1       # panes start at 1, not 0
set -g renumber-windows on      # renumber after closing a window
set -g set-clipboard on
set -g display-time 2000        # status messages stay 2s

# ---------- Keybindings ----------
# Prefix stays Ctrl-b (least surprising). Uncomment to switch to Ctrl-a:
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Intuitive split keys, open in current pane's path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window inherits current pane's path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable resize (hold ctrl and tap)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick toggles
bind Tab last-window
bind S choose-tree -Zs          # session picker (zoomed)
bind W choose-tree -Zw          # window picker

# Copy-mode: vi keys, y to yank
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ---------- Status bar ----------
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-bg colour235
set -g status-fg colour250
set -g status-left-length 40
set -g status-right-length 80
set -g status-left  "#[fg=colour39,bold] [#S] #[default]"
set -g status-right "#[fg=colour245]%Y-%m-%d %H:%M #[fg=colour39,bold]#H "
setw -g window-status-format         " #I:#W "
setw -g window-status-current-format "#[fg=colour15,bg=colour39,bold] #I:#W "
setw -g window-status-separator ""

# ---------- Quiet ----------
set -g monitor-activity off
set -g visual-activity off
set -g bell-action none

# ---------- Plugins (tpm) ----------
# Install plugins with: prefix + I
# Update plugins with:  prefix + U
# Remove plugins with:  prefix + alt + u
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'      # save/restore sessions across reboots: prefix + Ctrl-s / prefix + Ctrl-r
set -g @plugin 'tmux-plugins/tmux-continuum'      # auto-save every N minutes + auto-restore on tmux start

# tmux-resurrect: also restore pane contents (scrollback) and shell history
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum
set -g @continuum-restore 'on'                    # auto-restore last saved env when tmux starts
set -g @continuum-save-interval '15'              # save every 15 minutes

# Initialize tpm — keep this at the very bottom.
run '~/.tmux/plugins/tpm/tpm'
